<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sidekick Launcher</title>
<style>
  :root {
    --bg: #0f1729;
    --panel: #162042;
    --panel-hover: #1a2a55;
    --border: #2a2a4a;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #D62BCE;
    --accent-hover: #e879de;
    --green: #34d399;
    --grey: #555c6a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 15px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { padding: 32px 32px 16px; display: flex; align-items: center; gap: 16px; }
  header .brand { width: 56px; height: 56px; flex-shrink: 0;
    filter: drop-shadow(0 0 14px rgba(214, 43, 206, 0.35)); }
  header .titles { flex: 1; }
  h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
  h1 em { font-style: italic; color: var(--accent); font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 13px; }
  main { padding: 16px 32px 32px; max-width: 720px; }
  section { margin-top: 24px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); font-weight: 600; margin: 0 0 12px; }
  .card { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 16px; transition: background 0.1s; }
  .card:hover { background: var(--panel-hover); }
  .icon { width: 40px; height: 40px; flex-shrink: 0; border-radius: 6px;
    object-fit: contain; background: rgba(255,255,255,0.02); padding: 2px; }
  .icon.placeholder { background: var(--bg); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: var(--grey); }
  .dot.running { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.6); }
  .info { flex: 1; min-width: 0; }
  .name { font-weight: 600; }
  .port { color: var(--muted); font-size: 12px; margin-left: 8px; font-family: ui-monospace, Menlo, monospace; }
  .desc { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .actions { display: flex; gap: 8px; }
  button, a.btn { background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 5px;
    font: inherit; font-size: 13px; cursor: pointer; text-decoration: none;
    transition: all 0.1s; }
  button:hover, a.btn:hover { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #0f1115; border-color: var(--accent); }
  button.primary:hover { color: #0f1115; opacity: 0.9; }
  footer { color: var(--muted); font-size: 12px; padding: 16px 32px 32px; }
</style>
</head>
<body>
<header>
  <img id="brand-icon" class="brand" alt="" hidden />
  <div class="titles">
    <h1>Sidekick <em>Launcher</em></h1>
    <div class="subtitle">Front door for the Sidekick suite of tools.</div>
  </div>
</header>

<main>
  <section>
    <h2>Local tools</h2>
    <div id="tools"></div>
  </section>
  <section id="links-section" hidden>
    <h2>Links</h2>
    <div id="links"></div>
  </section>
</main>

<footer>Status refreshes every 3 seconds. After clicking Launch, the tool opens automatically once its port comes online.</footer>

<script>
const toolsEl = document.getElementById('tools');
const linksEl = document.getElementById('links');
const linksSection = document.getElementById('links-section');

// Tools the user has launched but that haven't come online yet.
// When their port goes live, the dashboard auto-opens their URL.
const pendingOpen = new Set();

async function fetchStatus() {
  const res = await fetch('/api/status');
  return res.json();
}

async function launchTool(id, btn) {
  btn.disabled = true;
  btn.textContent = 'Launching…';
  try {
    const res = await fetch('/api/launch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id}),
    });
    const data = await res.json();
    if (!data.ok) {
      btn.textContent = 'Failed';
      console.error(data.message);
      setTimeout(() => render(), 1500);
      return;
    }
    pendingOpen.add(id);
    // Poll faster for a bit so launches feel responsive.
    fastPoll(20);
  } catch (e) {
    btn.textContent = 'Error';
    console.error(e);
    return;
  }
  btn.textContent = 'Starting…';
}

let fastPollLeft = 0;
let fastPollTimer = null;
function fastPoll(ticks) {
  fastPollLeft = Math.max(fastPollLeft, ticks);
  if (fastPollTimer) return;
  fastPollTimer = setInterval(() => {
    render();
    fastPollLeft -= 1;
    if (fastPollLeft <= 0) {
      clearInterval(fastPollTimer);
      fastPollTimer = null;
    }
  }, 1000);
}

function makeIcon(entry) {
  const img = document.createElement('img');
  img.className = 'icon';
  img.alt = '';
  if (entry.icon) {
    img.src = `/icons/${entry.id}`;
    img.onerror = () => { img.classList.add('placeholder'); img.removeAttribute('src'); };
  } else {
    img.classList.add('placeholder');
  }
  return img;
}

function toolCard(tool) {
  const card = document.createElement('div');
  card.className = 'card';
  const icon = makeIcon(tool);
  const dot = document.createElement('div');
  dot.className = 'dot' + (tool.running ? ' running' : '');
  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `<div class="name">${tool.name}<span class="port">:${tool.port}</span></div>
    <div class="desc">${tool.description || ''}</div>`;
  const actions = document.createElement('div');
  actions.className = 'actions';
  if (tool.running) {
    const open = document.createElement('a');
    open.className = 'btn';
    open.href = tool.url;
    open.target = '_blank';
    open.rel = 'noopener';
    open.textContent = 'Open';
    actions.appendChild(open);
  } else {
    const launch = document.createElement('button');
    launch.className = 'primary';
    launch.textContent = 'Launch';
    launch.onclick = () => launchTool(tool.id, launch);
    actions.appendChild(launch);
  }
  card.append(icon, dot, info, actions);
  return card;
}

function linkCard(link) {
  const card = document.createElement('div');
  card.className = 'card';
  const icon = makeIcon(link);
  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `<div class="name">${link.name}</div>
    <div class="desc">${link.description || ''}</div>`;
  const actions = document.createElement('div');
  actions.className = 'actions';
  const open = document.createElement('a');
  open.className = 'btn';
  open.href = link.url;
  open.target = '_blank';
  open.rel = 'noopener';
  open.textContent = 'Open';
  actions.appendChild(open);
  card.append(icon, info, actions);
  return card;
}

async function render() {
  const data = await fetchStatus();
  const brandImg = document.getElementById('brand-icon');
  if (data.brand_icon) {
    brandImg.src = data.brand_icon;
    brandImg.hidden = false;
  } else {
    brandImg.hidden = true;
  }
  for (const tool of data.tools) {
    if (tool.running && pendingOpen.has(tool.id)) {
      pendingOpen.delete(tool.id);
      window.open(tool.url, '_blank', 'noopener');
    }
  }
  toolsEl.replaceChildren(...data.tools.map(toolCard));
  if (data.links && data.links.length) {
    linksSection.hidden = false;
    linksEl.replaceChildren(...data.links.map(linkCard));
  }
}

render();
setInterval(render, 3000);
</script>
</body>
</html>
